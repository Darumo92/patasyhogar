# Blog Structures by Type — Voice Variation Guide
# Each structure specifies sections, voice, word count, and E-E-A-T injection points.

comparison:
  name: "Comparativa de productos"
  voice: "analítico, basado en datos, experto pero accesible"
  word_count: "2000-3500"
  description: "Análisis detallado de productos con tabla comparativa y recomendación destacada"
  humanization:
    intro_variation: true  # Obligatorio: intro diferente a otros artículos de la misma categoría
    min_personal_experience: 2  # Mínimo 2 inserciones de experiencia personal
    asymmetric_lists: true  # Pros/contras con número variable por producto
    variable_faq_count: "3-7"  # No siempre 5
  geo_optimization:  # Generative Engine Optimization (IA search)
    verdict_prose: true  # OBLIGATORIO: frase en prosa ANTES del TopPick con veredicto directo
    question_h2: true  # Al menos 1-2 H2 en formato pregunta
    direct_answer_description: true  # La meta description debe incluir el nombre del producto recomendado
  structure:
    - section: "Veredicto rápido (prosa)"
      description: >
        OBLIGATORIO para GEO/IA. 1-2 frases en prosa ANTES del TopPick con la recomendación directa.
        Formato: "Después de analizar N modelos, **el mejor [producto] es [Nombre Producto]** por [razón principal].
        Si buscas [alternativa], el [Nombre Alternativa] es la mejor opción calidad-precio."
        Esta frase es lo que los modelos de IA (ChatGPT, Perplexity, Claude) citan como respuesta directa.
        NO es un componente, es texto markdown normal que los crawlers pueden leer.
      eeat_injection: false
    - section: "TopPick"
      description: "Producto destacado con componente TopPick (complementa el veredicto en prosa)"
      eeat_injection: false
    - section: "Introducción"
      description: "Contexto del problema, por qué importa elegir bien. Keyword principal. VARIAR formato: pregunta, anécdota, dato, recomendación directa."
      eeat_injection: true  # experiencia personal o métrica
    - section: "ComparisonTable"
      description: "Tabla comparativa con todos los productos"
      eeat_injection: false
    - section: "Análisis detallado"
      description: "Review individual de cada producto: pros, contras, para quién"
      eeat_injection: true  # experiencia de uso, datos reales
    - section: "Guía de compra"
      description: "Criterios para elegir: qué mirar, errores comunes"
      eeat_injection: false
    - section: "Nuestra recomendación"
      description: "Resumen final con recomendación por caso de uso"
      eeat_injection: false
    - section: "FAQs"
      description: "3-5 preguntas de People Also Ask"
      eeat_injection: false

listicle:
  name: "Listado/ranking"
  voice: "curador útil, ordenado, va al grano"
  word_count: "2500-4000"
  description: "Lista ordenada de productos o consejos con criterio claro de ranking"
  humanization:
    intro_variation: true
    min_personal_experience: 2
    asymmetric_lists: true
    variable_faq_count: "3-7"
  structure:
    - section: "Introducción"
      description: "Qué cubre la lista y criterio de selección"
      eeat_injection: true
    - section: "El listado"
      description: "Items numerados con descripción, pros/contras"
      eeat_injection: true
    - section: "Cómo elegir"
      description: "Guía rápida de criterios"
      eeat_injection: false
    - section: "FAQs"
      description: "3-5 preguntas frecuentes"
      eeat_injection: false

tutorial:
  name: "Tutorial / Guía paso a paso"
  voice: "profesor paciente, usa 'yo', comparte experiencia"
  word_count: "1500-2500"
  description: "Guía paso a paso para realizar una tarea de cuidado de mascotas"
  humanization:
    intro_variation: true
    min_personal_experience: 3  # Tutoriales deben ser más personales
    asymmetric_lists: true
    variable_faq_count: "3-7"
  geo_optimization:
    direct_answer_intro: true  # OBLIGATORIO: respuesta directa en 1-2 frases al inicio
    question_h2: true  # Al menos 1-2 H2 en formato pregunta
  structure:
    - section: "Introducción"
      description: >
        OBLIGATORIO: Empezar con respuesta directa en 1-2 frases (GEO).
        Ejemplo: "Para bañar a un gato, necesitas agua tibia (37°C), champú específico para gatos y toallas.
        El proceso dura 10-15 minutos." Luego contexto y experiencia personal.
      eeat_injection: true  # experiencia personal
    - section: "Qué necesitas"
      description: "Materiales o productos necesarios"
      eeat_injection: false
    - section: "Paso a paso"
      description: "Instrucciones detalladas numeradas"
      eeat_injection: true  # tips de experiencia
    - section: "Errores comunes"
      description: "Qué evitar y por qué"
      eeat_injection: false
    - section: "Cuándo acudir al veterinario"
      description: "Señales de alarma"
      eeat_injection: false
    - section: "FAQs"
      description: "3-5 preguntas frecuentes"
      eeat_injection: false

how_to:
  name: "Cómo hacer / Resolver problema"
  voice: "resolutivo, directo, empático con el problema"
  word_count: "1200-2000"
  description: "Respuesta directa a un problema concreto del dueño"
  humanization:
    intro_variation: true
    min_personal_experience: 2
    asymmetric_lists: true
    variable_faq_count: "3-5"
  geo_optimization:
    direct_answer_intro: true  # OBLIGATORIO: respuesta directa antes de desarrollar
    question_h2: true  # H2 principales en formato pregunta cuando sea natural
  structure:
    - section: "El problema + respuesta directa"
      description: >
        OBLIGATORIO: Las primeras 1-2 frases deben responder la pregunta del título directamente.
        Ejemplo para "¿Por qué mi perro come hierba?": "Los perros comen hierba principalmente por instinto
        y para facilitar la digestión. En la mayoría de casos es un comportamiento normal que no requiere
        intervención veterinaria." Luego desarrollar el problema en detalle.
      eeat_injection: true
    - section: "Solución rápida"
      description: "Respuesta directa para quien tiene prisa"
      eeat_injection: false
    - section: "Solución detallada"
      description: "Explicación paso a paso"
      eeat_injection: true
    - section: "Prevención"
      description: "Cómo evitar que vuelva a pasar"
      eeat_injection: false
    - section: "FAQs"
      description: "3-5 preguntas frecuentes"
      eeat_injection: false

review:
  name: "Review / Análisis en profundidad"
  voice: "reviewer honesto, admite inconvenientes, específico"
  word_count: "2000-3000"
  description: "Análisis en profundidad de un producto o categoría específica"
  humanization:
    intro_variation: true
    min_personal_experience: 3  # Reviews deben ser muy personales
    asymmetric_lists: true
    variable_faq_count: "3-7"
  structure:
    - section: "Resumen rápido"
      description: "Veredicto en 2-3 frases para quien no quiere leer todo"
      eeat_injection: false
    - section: "Qué es y para quién"
      description: "Contexto del producto y público objetivo"
      eeat_injection: false
    - section: "Puntos fuertes"
      description: "Lo mejor del producto, con datos concretos"
      eeat_injection: true
    - section: "Puntos débiles"
      description: "Lo peor, sin disimular"
      eeat_injection: true
    - section: "Comparación con alternativas"
      description: "Vs 2-3 alternativas directas"
      eeat_injection: false
    - section: "Veredicto final"
      description: "Para quién sí y para quién no"
      eeat_injection: false
    - section: "FAQs"
      description: "3-5 preguntas frecuentes"
      eeat_injection: false

thought_leadership:
  name: "Guía de experto / Opinión"
  voice: "opinión fundamentada, toma posición, no genérico"
  word_count: "1500-2500"
  description: "Artículo de opinión experta sobre un tema de cuidado animal"
  humanization:
    intro_variation: true
    min_personal_experience: 3
    asymmetric_lists: true
    variable_faq_count: "3-5"
  structure:
    - section: "La tesis"
      description: "Posición clara desde el primer párrafo"
      eeat_injection: true
    - section: "El contexto"
      description: "Por qué este tema importa ahora"
      eeat_injection: false
    - section: "Los argumentos"
      description: "Evidencia, datos, experiencia"
      eeat_injection: true
    - section: "Contraargumentos"
      description: "Reconocer la otra posición"
      eeat_injection: false
    - section: "Conclusión"
      description: "Reafirmar posición con matiz"
      eeat_injection: false
